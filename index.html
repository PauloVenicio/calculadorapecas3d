<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>PC Maker 3D - Calculadora</title>

<style>
* { box-sizing: border-box; }

:root {
    --bg: #0a0f1f;
    --card: #111933;
    --text: #ffffff;
    --primary: #00f2ff;
    --secondary: #2196f3;
}

body.light {
    --bg: #f2f2f2;
    --card: #ffffff;
    --text: #222;
    --primary: #2196f3;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 14px;
    padding-bottom: 120px;
}

.card {
    background: var(--card);
    width: 100%;
    padding: 16px;
    border-radius: 16px;
    max-width: 480px;
    margin: 0 auto;
    box-shadow: 0 0 20px var(--primary);
}

.logo-area {
    text-align: center;
    margin-bottom: 10px;
}

.logo-area img {
    max-width: 180px;
    max-height: 120px;
}

h2 {
    text-align: center;
    color: var(--primary);
}

label {
    margin-top: 12px;
    display: block;
}

input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #555;
    margin-top: 5px;
    background: transparent;
    color: var(--text);
}

.resultado {
    margin-top: 15px;
    background: rgba(0,0,0,0.2);
    padding: 12px;
    border-radius: 12px;
}

.preco-final {
    color: #00ff88;
    font-size: 1.4em;
    text-align: center;
}

button {
    width: 100%;
    padding: 13px;
    font-size: 16px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.btn-primary { background: var(--primary); color:#000; }
.btn-danger { background: #f44336; color:#fff; }
.btn-dark { background: var(--secondary); color:#fff; }

.historico {
    margin-top: 15px;
    background: rgba(0,0,0,0.2);
    padding: 10px;
    border-radius: 12px;
    max-height: 200px;
    overflow-y: auto;
}

footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #000;
    color: var(--primary);
    text-align: center;
    padding: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="card">

<div class="logo-area">
    <img src="logo horizontal.png" alt="Sua Logomarca">
</div>

<h2>🖨️ PC Maker 3D - Calculadora</h2>

<label>Peso (g)</label>
<input type="number" id="peso" step="0.01">

<label>Tempo (horas)</label>
<input type="number" id="tempo" step="0.1">

<label>Preço do filamento (R$/kg)</label>
<input type="number" id="precoKg" value="120">

<label>Custo da máquina (R$/hora)</label>
<input type="number" id="custoHora" value="3">

<label>Energia (R$/kWh)</label>
<input type="number" id="energia" value="0.90">

<label>Consumo (kW)</label>
<input type="number" id="consumo" value="0.15">

<div class="resultado" id="resultado"></div>

<button class="btn-primary" onclick="calcular()">Calcular</button>
<button class="btn-danger" onclick="limpar()">Limpar</button>

<div class="historico" id="historico"></div>

<button class="btn-dark" onclick="toggleModo()">Modo Claro / Escuro</button>

</div>

<footer>
Paulo Carvalho 2026 - Todos os direitos reservados.
</footer>

<script>
let historico = JSON.parse(localStorage.getItem("historico3d")) || [];
const LUCRO_FIXO = 120;
let modoClaro = false;

function calcular() {
    let peso = parseFloat(pesoInput.value);
    let tempo = parseFloat(tempoInput.value);
    let precoKg = parseFloat(precoKgInput.value);
    let custoHora = parseFloat(custoHoraInput.value);
    let energia = parseFloat(energiaInput.value);
    let consumo = parseFloat(consumoInput.value);

    if(isNaN(peso) || isNaN(tempo)) return;

    let custoFilamento = (precoKg/1000) * peso;
    let custoMaquina = tempo * custoHora;
    let custoEnergia = tempo * consumo * energia;
    let custoTotal = custoFilamento + custoMaquina + custoEnergia;
    let precoFinal = custoTotal * (1 + LUCRO_FIXO/100);

    resultado.innerHTML = `
        <p>🧵 Filamento: R$ ${custoFilamento.toFixed(2)}</p>
        <p>🖨 Máquina: R$ ${custoMaquina.toFixed(2)}</p>
        <p>⚡ Energia: R$ ${custoEnergia.toFixed(2)}</p>
        <p>Lucro fixo: ${LUCRO_FIXO}%</p>
        <hr>
        <div class="preco-final">💰 Preço Final: R$ ${precoFinal.toFixed(2)}</div>
    `;

    let registro = `${peso}g | ${tempo}h | R$ ${precoFinal.toFixed(2)}`;
    historico.push(registro);
    localStorage.setItem("historico3d", JSON.stringify(historico));
    atualizarHistorico();
}

function atualizarHistorico() {
    historicoDiv.innerHTML = "<b>Histórico:</b><br>" + historico.join("<br>");
}

function limpar() {
    document.querySelectorAll("input").forEach(i => i.value = "");
    resultado.innerHTML = "";
    historico = [];
    localStorage.removeItem("historico3d");
    atualizarHistorico();
}

function toggleModo() {
    modoClaro = !modoClaro;
    document.body.classList.toggle("light");
}

const pesoInput = document.getElementById("peso");
const tempoInput = document.getElementById("tempo");
const precoKgInput = document.getElementById("precoKg");
const custoHoraInput = document.getElementById("custoHora");
const energiaInput = document.getElementById("energia");
const consumoInput = document.getElementById("consumo");
const resultado = document.getElementById("resultado");
const historicoDiv = document.getElementById("historico");

document.querySelectorAll("input").forEach(i=>{
    i.addEventListener("input", calcular);
});

atualizarHistorico();
</script>

</body>
</html>
