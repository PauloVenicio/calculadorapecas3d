<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>PC Maker 3D - Calculadora</title>

<style>
* { box-sizing: border-box; }

:root {
    --bg: #0a0f1f;
    --card: #111933;
    --text: #ffffff;
    --primary: #00f2ff;
    --secondary: #2196f3;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 14px;
    padding-bottom: 120px;
}

.card {
    background: var(--card);
    width: 100%;
    padding: 16px;
    border-radius: 16px;
    max-width: 480px;
    margin: 0 auto;
    box-shadow: 0 0 20px var(--primary);
}

.logo-area {
    text-align: center;
    margin-bottom: 10px;
}

.logo-area img {
    max-width: 180px;
    max-height: 120px;
}

h2 {
    text-align: center;
    color: var(--primary);
}

label {
    margin-top: 12px;
    display: block;
}

input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #555;
    margin-top: 5px;
    background: transparent;
    color: var(--text);
}

.resultado {
    margin-top: 15px;
    background: rgba(0,0,0,0.2);
    padding: 12px;
    border-radius: 12px;
}

.resultado:empty,
.historico:empty {
    display: none;
}

.preco-final {
    color: #00ff88;
    font-size: 1.4em;
    text-align: center;
}

button {
    width: 100%;
    padding: 13px;
    font-size: 16px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.btn-primary { background: var(--primary); color:#000; }
.btn-danger { background: #f44336; color:#fff; }
.historico {
    margin-top: 15px;
    background: rgba(0,0,0,0.2);
    padding: 10px;
    border-radius: 12px;
    max-height: 200px;
    overflow-y: auto;
}

.historico-toggle {
    margin-top: 12px;
}

.historico-toggle label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0;
    cursor: pointer;
}

.historico-toggle input {
    width: auto;
    margin: 0;
    padding: 0;
}

footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #000;
    color: var(--primary);
    text-align: center;
    padding: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="card">

<div class="logo-area">
    <img src="logo horizontal.png" alt="Sua Logomarca">
</div>

<h2>🖨️ PC Maker 3D - Calculadora</h2>

<label>Nome do objeto:</label>
<input type="text" id="nomeObjeto" placeholder="Ex.: Suporte de celular">

<label>Peso (g):</label>
<input type="number" id="peso" step="0.01">

<label>Tempo (horas):</label>
<input type="number" id="tempo" step="0.1">

<label>Preço do filamento (R$/kg):</label>
<input type="number" id="precoKg" value="120">

<label>Custo da máquina (R$/hora):</label>
<input type="number" id="custoHora" value="3">

<label>Energia (R$/kWh):</label>
<input type="number" id="energia" value="0.90">

<label>Consumo (kW):</label>
<input type="number" id="consumo" value="0.15">

<div class="resultado" id="resultado"></div>

<button class="btn-primary" onclick="calcular()">Calcular</button>
<button class="btn-danger" onclick="limpar()">Limpar</button>

<div class="historico" id="historico"></div>

<div class="historico-toggle">
    <label for="mostrarHistorico">
        <input type="checkbox" id="mostrarHistorico">
        Mostrar histórico
    </label>
</div>

</div>

<footer>
Paulo Carvalho 2026 - Todos os direitos reservados.
</footer>

<script>
const DB_NAME = "pcmaker3d_db";
const DB_VERSION = 1;
const STORE_HISTORICO = "historico";
const LEGACY_KEY = "historico3d";

let historico = [];
const LUCRO_FIXO = 120;
let db = null;

function abrirBanco() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = (event) => {
            const database = event.target.result;
            if (!database.objectStoreNames.contains(STORE_HISTORICO)) {
                database.createObjectStore(STORE_HISTORICO, { keyPath: "id", autoIncrement: true });
            }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
    });
}

function carregarRegistrosDoBanco() {
    return new Promise((resolve, reject) => {
        const transaction = db.transaction(STORE_HISTORICO, "readonly");
        const store = transaction.objectStore(STORE_HISTORICO);
        const request = store.getAll();

        request.onsuccess = () => {
            const itens = request.result || [];
            itens.sort((a, b) => a.id - b.id);
            resolve(itens.map(item => item.texto));
        };
        request.onerror = () => reject(request.error);
    });
}

function salvarRegistroNoBanco(texto) {
    return new Promise((resolve, reject) => {
        const transaction = db.transaction(STORE_HISTORICO, "readwrite");
        const store = transaction.objectStore(STORE_HISTORICO);
        const request = store.add({ texto, criadoEm: new Date().toISOString() });

        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
    });
}

function limparHistoricoNoBanco() {
    return new Promise((resolve, reject) => {
        const transaction = db.transaction(STORE_HISTORICO, "readwrite");
        const store = transaction.objectStore(STORE_HISTORICO);
        const request = store.clear();

        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
    });
}

async function migrarLocalStorageParaBanco() {
    const legado = JSON.parse(localStorage.getItem(LEGACY_KEY)) || [];
    if (!Array.isArray(legado) || legado.length === 0) return;

    for (const item of legado) {
        await salvarRegistroNoBanco(item);
    }
    localStorage.removeItem(LEGACY_KEY);
}

async function inicializarHistorico() {
    try {
        db = await abrirBanco();
        await migrarLocalStorageParaBanco();
        historico = await carregarRegistrosDoBanco();
        atualizarHistorico();
    } catch (erro) {
        console.error("Erro ao abrir banco local:", erro);
        alert("Não foi possível carregar o banco local de histórico neste navegador.");
    }
}

async function calcular() {
    let nomeObjeto = nomeObjetoInput.value.trim();
    let peso = parseFloat(pesoInput.value);
    let tempo = parseFloat(tempoInput.value);
    let precoKg = parseFloat(precoKgInput.value);
    let custoHora = parseFloat(custoHoraInput.value);
    let energia = parseFloat(energiaInput.value);
    let consumo = parseFloat(consumoInput.value);

    if (isNaN(peso) || isNaN(tempo)) {
        alert("Preencha peso e tempo corretamente.");
        return;
    }

    let custoFilamento = (precoKg / 1000) * peso;
    let custoMaquina = tempo * custoHora;
    let custoEnergia = tempo * consumo * energia;
    let custoTotal = custoFilamento + custoMaquina + custoEnergia;
    let precoFinal = custoTotal * (1 + LUCRO_FIXO / 100);

    resultado.innerHTML = `
        <p><strong>📦 Produto:</strong> ${nomeObjeto || "Sem nome"}</p>
        <p>🧵 Filamento: R$ ${custoFilamento.toFixed(2)}</p>
        <p>🖨️ Máquina: R$ ${custoMaquina.toFixed(2)}</p>
        <p>⚡ Energia: R$ ${custoEnergia.toFixed(2)}</p>
        <p>Lucro fixo: ${LUCRO_FIXO}%</p>
        <hr>
        <div class="preco-final">💰 Preço Final: R$ ${precoFinal.toFixed(2)}</div>
    `;

    let nomeFormatado = nomeObjeto ? `${nomeObjeto} | ` : "";
    let registro = `${nomeFormatado}${peso}g | ${tempo}h | R$ ${precoFinal.toFixed(2)}`;

    await salvarRegistroNoBanco(registro);
    historico.push(registro);
    atualizarHistorico();
}

function atualizarHistorico() {
    if (!mostrarHistoricoInput.checked || historico.length === 0) {
        historicoDiv.innerHTML = "";
        return;
    }
    historicoDiv.innerHTML = "<b>Histórico:</b><br>" + historico.join("<br>");
}

async function limpar() {
    document.querySelectorAll("input").forEach(i => i.value = "");
    resultado.innerHTML = "";
    historico = [];
    await limparHistoricoNoBanco();
    atualizarHistorico();
}

const pesoInput = document.getElementById("peso");
const nomeObjetoInput = document.getElementById("nomeObjeto");
const tempoInput = document.getElementById("tempo");
const precoKgInput = document.getElementById("precoKg");
const custoHoraInput = document.getElementById("custoHora");
const energiaInput = document.getElementById("energia");
const consumoInput = document.getElementById("consumo");
const resultado = document.getElementById("resultado");
const historicoDiv = document.getElementById("historico");
const mostrarHistoricoInput = document.getElementById("mostrarHistorico");

mostrarHistoricoInput.addEventListener("change", atualizarHistorico);

inicializarHistorico();
</script>

</body>
</html>
